<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Launcher</title>
		<style>
			:root {
				color-scheme: dark;
				--bg: #000000;
				--panel: #0b0b0b;
				--panel-alt: #111111;
				--border: #2a2a2a;
				--text: #ffffff;
				--muted: #b7b7b7;
				--shadow: 0 18px 42px rgba(0, 0, 0, 0.55);
			}

			* {
				box-sizing: border-box;
			}

			html,
			body {
				min-height: 100%;
				margin: 0;
			}

			body {
				background: var(--bg);
				color: var(--text);
				font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
			}

			.page {
				min-height: 100vh;
				display: grid;
				place-items: center;
				padding: 24px;
			}

			.hero {
				width: min(680px, 100%);
				padding: 32px;
				border: 1px solid var(--border);
				border-radius: 20px;
				background: var(--panel);
				box-shadow: var(--shadow);
			}

			.hero h1 {
				margin: 0;
				font-size: clamp(2.2rem, 6vw, 4rem);
				line-height: 0.95;
				letter-spacing: -0.05em;
			}

			.actions {
				display: flex;
				gap: 12px;
				margin-top: 24px;
				flex-wrap: wrap;
			}

			button {
				appearance: none;
				border: 1px solid var(--border);
				border-radius: 14px;
				padding: 14px 18px;
				font: inherit;
				font-weight: 700;
				cursor: pointer;
				transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
			}

			.primary {
				background: #ffffff;
				color: #000000;
			}

			.secondary {
				background: var(--panel-alt);
				color: var(--text);
			}

			button:hover {
				transform: translateY(-1px);
			}
		</style>
	</head>
	<body>
		<div class="page">
			<section class="hero">
				<h1>Pr0xy Launcher</h1>
				<p class="lead">Open the launcher to browse the list. About:blank keeps the pr0xy hidden, and Direct Open opens like normal. <br> This link likely will last forever. Share all you want.
<br> If you paid for this, you got scammed.
<br> New links come out often I'll add them as they become available.</p>
				<div class="actions">
					<button class="primary" id="launchBtn" type="button">Open launcher</button>
				</div>
			</section>
		</div>

		<script>
			(function () {
				const proxies = [
					{ name: "Intersteller", host: "intersteller.studyeurope.edu.eu.org", desc: "Familiar layout and a steady default choice." },
					{ name: "Selenite", host: "selenite.studyeurope.edu.eu.org", desc: "Good for games and quick navigation.", featured: true },
					{ name: "Doge", host: "doge.studyeurope.edu.eu.org", desc: "Strong all-around pick with the cleanest feel.", featured: true },
					{ name: "Quasar", host: "quasar.studyeurope.edu.eu.org", desc: "Solid for browsing, games, and media." },
					{ name: "55gms", host: "55gms.studyeurope.edu.eu.org", desc: "Simple and dependable overall." },
					{ name: "Galaxy", host: "galaxy.studyeurope.edu.eu.org", desc: "OS-like look with a polished interface." },
					{ name: "Glint", host: "glint.studyeurope.edu.eu.org", desc: "Lightweight and responsive." },
					{ name: "Lunar", host: "lunar.studyeurope.edu.eu.org", desc: "Good for games and quick access." },
					{ name: "UniUB", host: "uniub.studyeurope.edu.eu.org", desc: "Balanced option for general use." },
					{ name: "Velara", host: "velara.studyeurope.edu.eu.org", desc: "Another decent pick for games." }
				];

				const launchBtn = document.getElementById("launchBtn");

				function buildLauncherHTML() {
					const cards = proxies.map((proxy, index) => {
						const directUrl = "https://" + proxy.host;
						const searchText = (proxy.name + " " + proxy.desc).toLowerCase();
						const directOnly = ["glint", "lunar", "uniub"].includes(proxy.name.toLowerCase());
						const actionButtons = directOnly
							? ['<button class="card-btn" type="button" data-action="direct" data-url="' + directUrl + '">Direct Open</button>'].join("")
							: [
								'<button class="card-btn" type="button" data-action="blank" data-url="' + directUrl + '">About:blank</button>',
								'<button class="card-btn secondary-action" type="button" data-action="direct" data-url="' + directUrl + '">Direct Open</button>'
							].join("");
						return [
							'<article class="proxy-card" data-search="' + searchText + '">',
							'<div class="card-head">',
							'<div>',
							'<div class="card-title">' + proxy.name + '</div>',
							'<div class="card-meta">' + String(index + 1).padStart(2, "0") + '</div>',
							'</div>',
							'</div>',
							'<p>' + proxy.desc + '</p>',
							'<div class="card-actions">',
							actionButtons,
							'</div>',
							'</article>'
						].join("");
					}).join("");

					return `
						<!DOCTYPE html>
						<html lang="en">
						<head>
							<meta charset="UTF-8" />
							<meta name="viewport" content="width=device-width, initial-scale=1.0" />
							<title>Proxy Launcher</title>
							<style>
								:root { color-scheme: dark; --bg: #000; --panel: #0b0b0b; --panel-alt: #111; --border: #2a2a2a; --text: #fff; --muted: #b7b7b7; --shadow: 0 18px 42px rgba(0,0,0,.55); }
								* { box-sizing: border-box; }
								html, body { min-height: 100%; margin: 0; }
								body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
								button, input { font: inherit; }
								button { appearance: none; border: 1px solid var(--border); border-radius: 14px; padding: 13px 14px; cursor: pointer; }
								.launcher-shell { min-height: 100vh; padding: 24px; }
								.launcher-wrap { width: min(1200px, 100%); margin: 0 auto; }
								.topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 22px; margin-bottom: 18px; background: var(--panel); border: 1px solid var(--border); border-radius: 20px; box-shadow: var(--shadow); }
								.title h1 { margin: 0; font-size: clamp(2rem, 4vw, 3rem); line-height: 1; letter-spacing: -0.05em; position: relative; top: -2px; }
								.title p { margin: 8px 0 0; color: var(--muted); }
								.search-group { width: min(100%, 340px); }
								.search { width: 100%; padding: 14px 16px; border-radius: 14px; border: 1px solid var(--border); background: var(--panel-alt); color: var(--text); }
								.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 18px; grid-auto-rows: 1fr; align-items: stretch; }
								.proxy-card { display: flex; flex-direction: column; gap: 16px; height: 100%; min-height: 240px; padding: 22px; background: var(--panel); border: 1px solid var(--border); border-radius: 18px; box-shadow: var(--shadow); }
								.card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
								.card-title { margin: 0; font-size: 1.45rem; line-height: 1.05; letter-spacing: -0.03em; position: relative; top: -2px; }
								.card-meta { margin-top: 4px; color: var(--muted); font-size: 0.78rem; font-weight: 700; letter-spacing: 0.06em; }
								.badge { display: inline-flex; align-items: center; justify-content: center; padding: 7px 10px; border-radius: 999px; border: 1px solid var(--border); background: var(--panel-alt); color: var(--text); font-size: 0.78rem; font-weight: 700; white-space: nowrap; }
								.proxy-card p { margin: 0; color: var(--muted); line-height: 1.6; min-height: 4.8em; }
								.card-actions { display: grid; gap: 10px; margin-top: auto; }
								.card-btn { width: 100%; min-height: 48px; display: inline-flex; align-items: center; justify-content: center; text-align: center; line-height: 1.1; background: #fff; color: #000; border-color: #fff; font-weight: 700; }
								.card-btn.secondary-action { background: var(--panel-alt); color: var(--text); border-color: var(--border); }
								.card-btn:hover { transform: translateY(-1px); }
								.help-btn { position: fixed; top: 18px; right: 18px; width: 46px; height: 46px; display: grid; place-items: center; background: var(--panel-alt); color: var(--text); border: 1px solid var(--border); border-radius: 50%; box-shadow: var(--shadow); cursor: pointer; font-size: 1.2rem; font-weight: 800; line-height: 1; }
								.modal { position: fixed; inset: 0; display: grid; place-items: center; padding: 20px; background: rgba(0,0,0,.9); z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 180ms ease; }
								.modal.is-open { opacity: 1; pointer-events: auto; }
								.modal.is-open .modal-card { transform: translateY(0) scale(1); opacity: 1; }
								.modal-card h3 { margin: 0 0 10px; font-size: 1.4rem; }
								.modal-card p { margin: 0 0 12px; color: var(--muted); }
								.modal-card ul { margin: 0 0 18px; padding-left: 18px; color: var(--muted); line-height: 1.6; }
								.modal-card li + li { margin-top: 8px; }
								.close-btn { background: #fff; color: #000; border-color: #fff; }
								@media (max-width: 720px) {
									.launcher-shell { padding: 16px; }
									.topbar { flex-direction: column; align-items: stretch; }
									.search-group { width: 100%; }
									.grid { grid-template-columns: 1fr; }
									.card-actions { grid-template-columns: 1fr; }
								}
							</style>
						</head>
						<body>
							<button class="help-btn" type="button" id="helpBtn" aria-label="Help">?</button>
							<main class="launcher-shell">
								<div class="launcher-wrap">
									<section class="topbar">
										<div class="title">
											<h1>Pr0xy Launcher</h1>
										</div>
											<div class="search-group">
												<input id="search" class="search" type="search" placeholder="Search proxies" autocomplete="off" aria-label="Search proxies" />
											</div>
									</section>
									<section class="grid" id="grid">${cards}</section>
								</div>
							</main>
							<div class="modal" id="helpModal" aria-hidden="true">
								<div class="modal-card" role="dialog" aria-modal="true" aria-label="Help">
									<h3>Quick help</h3>
									<p>Pick a card, then choose a launch mode.</p>
									<ul>
										<li>Games: Selenite is suggested, try them all.</li>
										<li>Movies: Use "cineby.sc" on one of the links.</li>
										<li>Minecraft: Launch Minecraft from the launcher and use an unblocked server.</li>
										<li>Better games: Use GeForce Now for real PC games and Crazygames for extra games.</li>
									</ul>
									<button class="close-btn" type="button" id="closeHelp">Close</button>
								</div>
							</div>
							${'<scr' + 'ipt>'}
								const search = document.getElementById("search");
								const grid = document.getElementById("grid");
								const helpBtn = document.getElementById("helpBtn");
								const helpModal = document.getElementById("helpModal");
								const closeHelp = document.getElementById("closeHelp");

								function openAboutBlank(url) {
									const popup = window.open("about:blank", "_blank");
									if (!popup) return;
									popup.document.write('<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Pr0xy</title><style>html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#000;}iframe{position:fixed;inset:0;width:100%;height:100%;border:0;}</style></head><body><iframe src="' + url + '" referrerpolicy="no-referrer"></iframe></body></html>');
									popup.document.close();
								}

								function showHelp() {
									helpModal.classList.add("is-open");
									helpModal.setAttribute("aria-hidden", "false");
								}

								function hideHelp() {
									helpModal.classList.remove("is-open");
									helpModal.setAttribute("aria-hidden", "true");
								}

								helpBtn.addEventListener("click", showHelp);
								closeHelp.addEventListener("click", hideHelp);
								helpModal.addEventListener("click", (event) => {
									if (event.target === helpModal) hideHelp();
								});
								document.addEventListener("keydown", (event) => {
									if (event.key === "Escape") hideHelp();
								});

								search.addEventListener("input", () => {
									const query = search.value.trim().toLowerCase();
									grid.querySelectorAll(".proxy-card").forEach((card) => {
										card.style.display = card.dataset.search.includes(query) ? "flex" : "none";
									});
								});

								grid.addEventListener("click", (event) => {
									const button = event.target.closest("button[data-url]");
									if (!button) return;
									const url = button.dataset.url;
									if (button.dataset.action === "blank") {
										openAboutBlank(url);
										return;
									}
									window.open(url, "_blank", "noopener");
								});
							${'</scr' + 'ipt>'}
						</body>
						</html>`;
					};

				function launchLauncher() {
					const popup = window.open("about:blank", "_blank");
					if (!popup) {
						return;
					}

					popup.document.write(buildLauncherHTML());
					popup.document.close();
					window.location.href = "https://google.com";
				}

				launchBtn.addEventListener("click", launchLauncher);
			})();
		</script>
	</body>
</html>
